version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    groups:
      minor-and-major:
        update-types:
          - patch
          - minor
          - major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      minor-and-major:
        update-types:
          - patch
          - minor
          - major
